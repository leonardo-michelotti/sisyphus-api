name: Build curated runtime image

on:
  workflow_dispatch:
    inputs:
      publish_image:
        description: Publicar a imagem validada no GHCR
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UV_VERSION: "0.11.28"

jobs:
  build:
    name: Curate, verify and package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Check out the selected revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install locked project
        run: |
          python -m pip install "uv==${UV_VERSION}"
          uv sync --frozen --extra dev

      - name: Verify application and deterministic pipeline
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy src
          uv run pytest -q

      - name: Build the curated dataset from live sources
        env:
          SISYPHUS_SOURCE_COMMIT: ${{ github.sha }}
        run: uv run python run_pipeline.py all

      - name: Read and verify release identity
        id: release
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import sqlite3

          with sqlite3.connect("data/sisyphus.db") as connection:
              row = connection.execute(
                  """select schema_version, dataset_version, run_id,
                            manifest_sha256, source_commit
                     from build_metadata"""
              ).fetchone()
              integrity = connection.execute("pragma integrity_check").fetchone()
          if row is None or integrity != ("ok",):
              raise SystemExit("SQLite de release inválido")
          schema, dataset, run_id, manifest, source_commit = row
          if source_commit != "${{ github.sha }}":
              raise SystemExit("commit do dataset diverge da revisão do workflow")
          print(f"schema={schema}")
          print(f"dataset={dataset}")
          print(f"run_id={run_id}")
          print(f"manifest={manifest}")
          PY
          echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build local release candidate
        run: |
          docker build \
            --file Dockerfile.release \
            --tag sisyphus-release:verify \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "io.sisyphus.dataset.version=${{ steps.release.outputs.dataset }}" \
            .

      - name: Smoke test the release candidate
        shell: bash
        run: |
          container=$(docker run --detach --publish 127.0.0.1::8000 sisyphus-release:verify)
          trap 'docker logs "$container"; docker rm --force "$container"' EXIT
          port=$(docker port "$container" 8000/tcp | sed 's/.*://')
          for attempt in {1..30}; do
            if curl --fail --silent "http://127.0.0.1:${port}/health/dataset"; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent "http://127.0.0.1:${port}/v1/quote-of-the-day"
          test "$(docker inspect --format '{{.Config.User}}' sisyphus-release:verify)" = "appuser"
          docker exec "$container" test -r /app/data/sisyphus.db
          docker exec "$container" test ! -e /app/data/sisyphus.duckdb
          docker exec "$container" test ! -d /app/data/bronze

      - name: Log in to GHCR
        if: ${{ inputs.publish_image }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish immutable image
        if: ${{ inputs.publish_image }}
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.release
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:git-${{ steps.release.outputs.short_sha }}-data-${{ steps.release.outputs.dataset }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.sisyphus.dataset.version=${{ steps.release.outputs.dataset }}

      - name: Attest image provenance
        if: ${{ inputs.publish_image }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Record release summary
        shell: bash
        run: |
          {
            echo "### Curated runtime candidate"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Dataset: \`${{ steps.release.outputs.dataset }}\`"
            echo "- Schema: \`${{ steps.release.outputs.schema }}\`"
            echo "- Run: \`${{ steps.release.outputs.run_id }}\`"
            echo "- Manifest: \`${{ steps.release.outputs.manifest }}\`"
            echo "- Published: \`${{ inputs.publish_image }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
